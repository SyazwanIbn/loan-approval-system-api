spring:
    application:
        name: loan-approval-system

    datasource:
        url: jdbc:postgresql://localhost:5432/loan_system_db
        username: loan_admin
        password: rootpassword123
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect

    docker:
        compose:
            enabled: true
            file: docker-compose.yml